name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v

      - name: Run inference (baseline policy, seed 42)
        run: python inference.py --seed 42

      - name: Verify inference output format
        run: |
          output=$(python inference.py --seed 42)
          echo "$output"
          # Must have at least 3 [END] lines with score strictly between 0 and 1
          end_count=$(echo "$output" | grep -c '^\[END\]')
          echo "Found $end_count [END] lines"
          if [ "$end_count" -lt 3 ]; then
            echo "ERROR: Need at least 3 [END] lines, got $end_count"
            exit 1
          fi
          # Check no score is 0.0 or 1.0
          if echo "$output" | grep -E 'score=(0\.0000|1\.0000)'; then
            echo "ERROR: Score is exactly 0.0 or 1.0"
            exit 1
          fi
          echo "All checks passed"
