spec_version: 1
name: soc-trilemma-benchmark
type: space
runtime: fastapi
app: app.app:app
port: 7860

description: >
  A 3-stage Cyber Kill Chain RL environment where an agent acts as a SOC analyst
  triaging DPI alerts under SLA pressure. Features seeded determinism, cascading
  outage penalties, and MCP tool discovery.

tasks:
  - id: easy
    description: "Easy — 2 decoys, 0.03 SLA penalty/tick, 100 max steps"
    path: tasks/easy.yaml
    pass_criteria:
      attacker_blocked: true
      min_survival_score: 0.3

  - id: medium
    description: "Medium — 3 decoys, 0.07 SLA penalty/tick, 85 max steps"
    path: tasks/medium.yaml
    pass_criteria:
      attacker_blocked: true
      min_survival_score: 0.25

  - id: hard
    description: "Hard — 6 decoys, 0.13 SLA penalty/tick, 70 max steps"
    path: tasks/hard.yaml
    pass_criteria:
      attacker_blocked: true
      min_survival_score: 0.2

  - id: expert
    description: "Expert — 8 decoys, 0.20 SLA penalty/tick, 55 max steps"
    path: tasks/expert.yaml
    pass_criteria:
      attacker_blocked: true
      min_survival_score: 0.15

server:
  port: 7860
  endpoints:
    - GET /health
    - POST /reset
    - POST /step
    - GET /state
    - GET /metadata
    - GET /schema
    - POST /mcp
    - WebSocket /ws
