spec_version: 1
name: soc-trilemma-benchmark
type: space
runtime: fastapi
app: app.app:app
port: 7860

description: >
  A 3-stage Cyber Kill Chain RL environment where an agent acts as a SOC analyst
  triaging DPI alerts under SLA pressure. Features seeded determinism, cascading
  outage penalties, and MCP tool discovery.

tasks:
  - id: easy
    description: "Easy difficulty — 2 decoys, low SLA penalty, 100 max steps"
    path: tasks/easy.yaml
    grader:
      type: inference
      script: inference.py
      score_key: grader_score
    pass_criteria:
      attacker_blocked: true
      min_survival_score: 0.3

  - id: medium
    description: "Medium difficulty — 4 decoys, moderate SLA penalty, 85 max steps"
    path: tasks/medium.yaml
    grader:
      type: inference
      script: inference.py
      score_key: grader_score
    pass_criteria:
      attacker_blocked: true
      min_survival_score: 0.25

  - id: hard
    description: "Hard difficulty — 4 decoys, high SLA penalty, 75 max steps"
    path: tasks/hard.yaml
    grader:
      type: inference
      script: inference.py
      score_key: grader_score
    pass_criteria:
      attacker_blocked: true
      min_survival_score: 0.2

server:
  port: 7860
  endpoints:
    - GET /health
    - POST /reset
    - POST /step
    - GET /state
